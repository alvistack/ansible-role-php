_service: "{{ __service[php_release] }}"
__service:
  "8.5": php8.5-fpm.service
  "8.4": php8.4-fpm.service
  "8.3": php8.3-fpm.service

_apt_key: "{{ __apt_key[php_release] }}"
__apt_key:
  "8.5":
    - url: https://packages.sury.org/php/apt.gpg
      dest: /etc/apt/keyrings/ondrej.asc
      checksum: "sha256:d63c11bc5067b1849c6a42a2d061916ba7c07632d4c0dbda4789d66fb263a285"
    - url: https://downloadcontent.opensuse.org/repositories/home:/alvistack/Debian_Testing/Release.key
      dest: /etc/apt/keyrings/home-alvistack.asc
      checksum: "sha256:2959bf5709615cba0109715e4c2001066a4536398fa54f0f602abc208f04017e"
  "8.4":
    - url: https://packages.sury.org/php/apt.gpg
      dest: /etc/apt/keyrings/ondrej.asc
      checksum: "sha256:d63c11bc5067b1849c6a42a2d061916ba7c07632d4c0dbda4789d66fb263a285"
    - url: https://downloadcontent.opensuse.org/repositories/home:/alvistack/Debian_Testing/Release.key
      dest: /etc/apt/keyrings/home-alvistack.asc
      checksum: "sha256:2959bf5709615cba0109715e4c2001066a4536398fa54f0f602abc208f04017e"
  "8.3":
    - url: https://packages.sury.org/php/apt.gpg
      dest: /etc/apt/keyrings/ondrej.asc
      checksum: "sha256:d63c11bc5067b1849c6a42a2d061916ba7c07632d4c0dbda4789d66fb263a285"
    - url: https://downloadcontent.opensuse.org/repositories/home:/alvistack/Debian_Testing/Release.key
      dest: /etc/apt/keyrings/home-alvistack.asc
      checksum: "sha256:2959bf5709615cba0109715e4c2001066a4536398fa54f0f602abc208f04017e"

_deb822_repository: "{{ __deb822_repository[php_release] }}"
__deb822_repository:
  "8.5":
    - name: sury-php
      types: deb
      uris: https://packages.sury.org/php
      suites: bookworm
      components: main
      signed_by: https://packages.sury.org/php/apt.gpg
      enabled: true
      state: present
    - name: home-alvistack
      types: deb
      uris: https://downloadcontent.opensuse.org/repositories/home:/alvistack/Debian_Testing
      suites: /
      components:
      signed_by: /etc/apt/keyrings/home-alvistack.asc
      enabled: true
      state: present
  "8.4":
    - name: sury-php
      types: deb
      uris: https://packages.sury.org/php
      suites: bookworm
      components: main
      signed_by: https://packages.sury.org/php/apt.gpg
      enabled: true
      state: present
    - name: home-alvistack
      types: deb
      uris: https://downloadcontent.opensuse.org/repositories/home:/alvistack/Debian_Testing
      suites: /
      components:
      signed_by: /etc/apt/keyrings/home-alvistack.asc
      enabled: true
      state: present
  "8.3":
    - name: sury-php
      types: deb
      uris: https://packages.sury.org/php
      suites: bookworm
      components: main
      signed_by: https://packages.sury.org/php/apt.gpg
      enabled: true
      state: present
    - name: home-alvistack
      types: deb
      uris: https://downloadcontent.opensuse.org/repositories/home:/alvistack/Debian_Testing
      suites: /
      components:
      signed_by: /etc/apt/keyrings/home-alvistack.asc
      enabled: true
      state: present

